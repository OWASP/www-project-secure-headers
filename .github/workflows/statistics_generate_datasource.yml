name: statistics - Generate datasources for statistics
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 1 * *'
permissions: read-all    
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write    
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"
    - name: Install dependencies
      run: |
        cd subprojects/statistics
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - name: Run data gathering script
      run: |
        cd subprojects/statistics/scripts
        python gather_data.py
        ls -l --block-size=M ../data/data.db
    - name: Publish dataset release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        RELEASE_TAG="statistics-dataset-$(date +'%Y-%m-%d')"
        if ! gh release view "$RELEASE_TAG"; then
          gh release create "$RELEASE_TAG" --title "$RELEASE_TAG" --notes "Monthly generated dataset."
        fi
        gh release upload "$RELEASE_TAG" subprojects/statistics/data/data.db subprojects/statistics/data/input.csv --clobber
