name: mainsite - Monitor oshp site references
on:
  workflow_dispatch:
  push:
    paths:
      - 'mainsite/08_case_studies.md'
  schedule:
    - cron: '0 0 * * 0'
permissions: read-all     
jobs:
  build:
    runs-on: ubuntu-latest   
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        playwright install --with-deps chromium
    - name: Run the validation
      run: |
        cd ci; python monitoring_oshp_site_references.py "${{ secrets.GITHUB_TOKEN }}"


